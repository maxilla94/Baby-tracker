<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baby Tracker</title>

<style>
body{
    font-family: system-ui;
    margin:20px;
    background:#111;
    color:#fff;
}
button{
    width:100%;
    padding:18px;
    margin:8px 0;
    font-size:18px;
    border-radius:14px;
    border:none;
    color:#fff;
    font-weight:600;
}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
.full{width:100%}
.feed{background:#2e7dff;}
.sleep{background:#6a5acd;}
.diaper{background:#2aa876;}
.note{background:#444;}
.card{
    background:#1c1c1c;
    padding:15px;
    border-radius:14px;
    margin:10px 0;
}
.small{opacity:.7;font-size:14px}
table td{padding:4px 2px;text-align:center}
table td:first-child{text-align:left}
</style>
</head>

<body>

<div style="text-align:center;font-size:12px;opacity:.6;margin-bottom:10px">
WERSJA TESTOWA – dane mogą zostać usunięte
</div>

<div id="dateBar" style="font-size:14px;opacity:.8;margin-bottom:6px">
</div>

<h2>TERAZ</h2>
<div class="card">
<div id="sinceFeed">od karmienia: -</div>
<div id="sinceSleep">sen: -</div>
<div id="sinceDiaper">od pieluchy: -</div>
</div>

<h2>AKCJE</h2>

<div class="grid2">
<button class="feed" onclick="toggleFeed()">🍼 Karmienie</button>
<button class="sleep" onclick="toggleSleep()">😴 Sen</button>
</div>

<div class="grid3">
<button class="diaper" onclick="addEvent('diaper_pee')">💧 Siku</button>
<button class="diaper" onclick="addEvent('diaper_poop')">💩 Kupa</button>
<button class="diaper" onclick="addEvent('diaper_mix')">💥 Mieszane</button>
</div>

<button class="note full" onclick="addNote()">📝 Notatka</button>

<h2>DZIŚ</h2>
<div id="timeline"></div>

<h2>PODSUMOWANIE DNIA</h2>
<div class="card" id="todaySummary">liczenie...</div>

<h2>OSTATNIE 7 DNI</h2>
<div class="card" id="weekSummary">liczenie...</div>

<button class="note" onclick="exportReport()">📄 Eksportuj raport tygodniowy</button>

<script>

const KEY="baby_events_v1";
let events=JSON.parse(localStorage.getItem(KEY)||"[]");

function save(){
 localStorage.setItem(KEY,JSON.stringify(events));
 render();
}

function now(){return Date.now();}

function addEvent(type){
 closeActive(type);
 events.push({id:now(),type,time:now()});
 save();
}

function toggleFeed(){
 let active=events.findLast(e=>e.type==="feed_start" && !events.some(x=>x.type==="feed_end" && x.time>e.time));
 if(active){ addEvent("feed_end"); }
 else{ addEvent("feed_start"); }
}

function toggleSleep(){
 let active=events.findLast(e=>e.type==="sleep_start" && !events.some(x=>x.type==="sleep_end" && x.time>e.time));
 if(active){ addEvent("sleep_end"); }
 else{ addEvent("sleep_start"); }
}

function closeActive(newType){
 let last=events.at(-1);
 if(!last)return;

 if(last.type==="feed_start" && newType!=="feed_end"){
  if(confirm("Zakończyć karmienie?")) addEvent("feed_end");
 }
 if(last.type==="sleep_start" && newType!=="sleep_end"){
  if(confirm("Zakończyć sen?")) addEvent("sleep_end");
 }
}

function addNote(){
 let txt=prompt("Notatka:");
 if(!txt)return;
 events.push({id:now(),type:"note",time:now(),note:txt});
 save();
}

function format(ms){
 let m=Math.floor(ms/60000);
 let h=Math.floor(m/60);
 m%=60;
 return (h? h+"h ":"")+m+"m";
}

function last(type){
 return [...events].reverse().find(e=>e.type===type);
}

function renderDate(){
 let d=new Date();
 let days=["niedziela","poniedziałek","wtorek","środa","czwartek","piątek","sobota"];
 let txt=days[d.getDay()]+" • "+d.toLocaleDateString();
 document.getElementById("dateBar").innerText=txt;
}

function renderNow(){
 let lf=last("feed_end");
 let ld=last("diaper_pee")||last("diaper_poop")||last("diaper_mix");
 let ls=last("sleep_end");

 document.getElementById("sinceFeed").innerText=
  lf? "od karmienia: "+format(now()-lf.time):"od karmienia: -";

 document.getElementById("sinceDiaper").innerText=
  ld? "od pieluchy: "+format(now()-ld.time):"od pieluchy: -";

 let activeSleep=events.findLast(e=>e.type==="sleep_start" && !events.some(x=>x.type==="sleep_end" && x.time>e.time));

 if(activeSleep){
  document.getElementById("sinceSleep").innerText="śpi: "+format(now()-activeSleep.time);
 }else{
  document.getElementById("sinceSleep").innerText=
   ls? "od snu: "+format(now()-ls.time):"od snu: -";
 }
}

function renderTimeline(){
 let start=new Date(); start.setHours(0,0,0,0);
 let today=events.filter(e=>e.time>start.getTime()).reverse();

 let html="";
 today.forEach(e=>{
  let t=new Date(e.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  let label={
   feed_start:"🍼 start karmienia",
   feed_end:"🍼 koniec karmienia",
   sleep_start:"😴 zasnął",
   sleep_end:"😴 pobudka",
   diaper_pee:"💧 siku",
   diaper_poop:"💩 kupa",
   diaper_mix:"💥 mieszane",
   note:"📝 "+e.note
  }[e.type];
  html+=`<div class="card"><div>${label}</div><div class="small">${t}</div></div>`;
 });

 document.getElementById("timeline").innerHTML=html||"Brak wpisów";
}

function render(){
 renderDate();
 renderNow();
 renderTimeline();
 renderTodaySummary();
 renderWeekSummary();
}

setInterval(renderNow,1000);
function getDayStart(offset=0){
 let d=new Date();
 d.setHours(0,0,0,0);
 d.setDate(d.getDate()-offset);
 return d.getTime();
}

function getEventsBetween(start,end){
 return events.filter(e=>e.time>=start && e.time<end);
}

function sumDurations(list,startType,endType){
 let total=0;
 for(let i=0;i<list.length;i++){
  if(list[i].type===startType){
   let end=list.slice(i+1).find(x=>x.type===endType);
   if(end) total+=end.time-list[i].time;
  }
 }
 return total;
}
function napStats(list){
 let long=0, short=0;

 for(let i=0;i<list.length;i++){
  if(list[i].type==="sleep_start"){
   let end=list.slice(i+1).find(x=>x.type==="sleep_end");
   if(end){
    let duration=end.time-list[i].time;
    if(duration>45*60*1000) long++;
    else short++;
   }
  }
 }
 return {long,short};
}

function count(type,list){return list.filter(e=>e.type===type).length;}

function renderTodaySummary(){
 let start=getDayStart();
 let end=getDayStart(-1);
 let day=getEventsBetween(start,end);

 let feeds=count("feed_end",day);
 let feedTime=sumDurations(day,"feed_start","feed_end");

 let sleep=sumDurations(day,"sleep_start","sleep_end");
 let naps=count("sleep_end",day);
 let nap=napStats(day);

 let diapers=count("diaper_pee",day)+count("diaper_poop",day)+count("diaper_mix",day);

 document.getElementById("todaySummary").innerHTML=
 `🍼 ${format(feedTime)} (${feeds} karmień)<br>
  😴 ${format(sleep)} (${naps} drzemek)<br>
  <span class="small">>45 min: ${nap.long} | ≤45 min: ${nap.short}</span><br>
  💩 ${diapers} pieluch`;
}

function renderWeekSummary(){
 let html=`<table style="width:100%;font-size:14px;border-collapse:collapse">
 <tr style="opacity:.7">
 <td>Dzień</td>
 <td>🍼</td>
 <td>😴</td>
 <td>💧</td>
 <td>💩</td>
 <td>💥</td>
 </tr>`;

 for(let i=0;i<7;i++){
  let start=getDayStart(i);
  let end=getDayStart(i-1);
  let day=getEventsBetween(start,end);

  let feeds=count("feed_end",day);
  let sleep=sumDurations(day,"sleep_start","sleep_end");
  let nap=napStats(day);

  let pee=count("diaper_pee",day);
  let poop=count("diaper_poop",day);
  let mix=count("diaper_mix",day);

  let label=i===0?"dziś":i===1?"wczoraj":i+"d";

  html+=`<tr>
   <td>${label}</td>
   <td>${feeds}</td>
   <td>${format(sleep)}</td>
   <td>${pee}</td>
   <td>${poop}</td>
   <td>${mix}</td>
  </tr>`;
 }

 html+="</table>";
 document.getElementById("weekSummary").innerHTML=html;
}

function exportReport(){
 let start=getDayStart(6);
 let week=getEventsBetween(start,Date.now());

 let feeds=count("feed_end",week);
 let feedTime=sumDurations(week,"feed_start","feed_end");
 let sleep=sumDurations(week,"sleep_start","sleep_end");
 let naps=count("sleep_end",week);
 let nap=napStats(week);
 let pee=count("diaper_pee",week);
 let poop=count("diaper_poop",week);
 let mix=count("diaper_mix",week);

 let txt=
`Raport tygodniowy

Karmienia: ${feeds}
Czas karmienia: ${format(feedTime)}

Sen: ${format(sleep)} (${naps} drzemek)
Drzemki >45 min: ${nap.long}
Drzemki ≤45 min: ${nap.short}

Pieluchy:
siku: ${pee}
kupa: ${poop}
mieszane: ${mix}`;

 let blob=new Blob([txt],{type:"text/plain"});
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="raport.txt";
 a.click();
}

render();

</script>

</body>
